<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Core Tempest - 리더보드</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }
    h1 {
      text-align: center;
      margin: 0 0 12px;
      font-size: 42px;
    }
    p.desc {
      text-align: center;
      color: #bbb;
      margin: 0 0 28px;
    }
    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    button, a.btn {
      background: #111;
      color: #fff;
      border: 1px solid #666;
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
      text-decoration: none;
    }
    button:hover, a.btn:hover {
      border-color: #aaa;
    }
    .panel {
      border: 1px solid #444;
      background: #0a0a0a;
      padding: 16px;
    }
    .note {
      color: #8fd3ff;
      margin-bottom: 14px;
      font-size: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    th, td {
      border-bottom: 1px solid #222;
      padding: 12px 10px;
      text-align: left;
      word-break: break-word;
    }
    th:nth-child(1), td:nth-child(1) { width: 70px; text-align: center; }
    th:nth-child(3), td:nth-child(3) { width: 140px; text-align: right; }
    th:nth-child(4), td:nth-child(4) { width: 220px; text-align: center; }
    .muted { color: #999; }
    .center { text-align: center; }
    .error { color: #ff8d8d; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>리더보드</h1>
    <p class="desc">같은 이름은 최고 점수 1개만 표시됩니다.</p>

    <div class="actions">
      <button id="refreshBtn">새로고침</button>
      <a class="btn" href="../">메인으로</a>
    </div>

    <div class="panel">
      <div class="note">정렬 기준: 이름별 최고 점수 1개만 반영, 점수 내림차순</div>
      <div id="status" class="muted">불러오는 중...</div>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>이름</th>
            <th>점수</th>
            <th>기록 시간</th>
          </tr>
        </thead>
        <tbody id="leaderboardBody"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      query,
      orderBy,
      limit
    } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA65hHD3pzh8Jv91xBWxMOK_FG9j8vNL2o",
      authDomain: "core-tempest-11588.firebaseapp.com",
      projectId: "core-tempest-11588",
      storageBucket: "core-tempest-11588.firebasestorage.app",
      messagingSenderId: "343743820806",
      appId: "1:343743820806:web:41391a57902093fea57f87",
      measurementId: "G-4P8SZVSN3Q"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const bodyEl = document.getElementById("leaderboardBody");
    const statusEl = document.getElementById("status");
    const refreshBtn = document.getElementById("refreshBtn");

    function formatDate(value) {
      if (!value) return "-";
      try {
        if (value.toDate) return value.toDate().toLocaleString("ko-KR");
        if (typeof value === "string" || typeof value === "number") {
          return new Date(value).toLocaleString("ko-KR");
        }
      } catch (_) {}
      return "-";
    }

    function getDisplayName(data) {
      const raw = (data.name ?? data.userId ?? "익명").toString().trim();
      return raw || "익명";
    }

    function getNameKey(name) {
      return name.trim().toLowerCase();
    }

    async function loadLeaderboard() {
      statusEl.textContent = "불러오는 중...";
      statusEl.className = "muted";
      bodyEl.innerHTML = "";

      try {
        const q = query(collection(db, "scores"), orderBy("score", "desc"), limit(300));
        const snap = await getDocs(q);

        const bestByName = new Map();

        snap.forEach((docSnap) => {
          const data = docSnap.data();
          const displayName = getDisplayName(data);
          const nameKey = getNameKey(displayName);
          const score = Number(data.score ?? 0);
          const createdAt = data.createdAt ?? null;

          if (!bestByName.has(nameKey)) {
            bestByName.set(nameKey, { displayName, score, createdAt });
            return;
          }

          const prev = bestByName.get(nameKey);
          if (score > prev.score) {
            bestByName.set(nameKey, { displayName, score, createdAt });
          } else if (score === prev.score) {
            const prevTime = prev.createdAt?.toDate ? prev.createdAt.toDate().getTime() : 0;
            const newTime = createdAt?.toDate ? createdAt.toDate().getTime() : 0;
            if (newTime > prevTime) {
              bestByName.set(nameKey, { displayName, score, createdAt });
            }
          }
        });

        const rows = Array.from(bestByName.values())
          .sort((a, b) => {
            if (b.score !== a.score) return b.score - a.score;
            const aTime = a.createdAt?.toDate ? a.createdAt.toDate().getTime() : 0;
            const bTime = b.createdAt?.toDate ? b.createdAt.toDate().getTime() : 0;
            return bTime - aTime;
          })
          .slice(0, 50);

        if (!rows.length) {
          statusEl.textContent = "아직 기록이 없습니다.";
          bodyEl.innerHTML = '<tr><td colspan="4" class="center muted">표시할 점수가 없습니다.</td></tr>';
          return;
        }

        statusEl.textContent = `총 ${rows.length}명 표시 중`;
        bodyEl.innerHTML = rows.map((row, idx) => `
          <tr>
            <td>${idx + 1}</td>
            <td>${row.displayName}</td>
            <td>${row.score}</td>
            <td>${formatDate(row.createdAt)}</td>
          </tr>
        `).join("");
      } catch (err) {
        console.error(err);
        statusEl.textContent = "리더보드를 불러오지 못했습니다.";
        statusEl.className = "error";
        bodyEl.innerHTML = '<tr><td colspan="4" class="center error">불러오기 실패</td></tr>';
      }
    }

    refreshBtn.addEventListener("click", loadLeaderboard);
    loadLeaderboard();
  </script>
</body>
</html>
