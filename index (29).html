<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BulletHell-Web</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div id="mainMenu">
    <h1>BulletHell-Web</h1>
    <button id="btnStart">게임 시작</button>

    <div id="skinShop">
      <h2>스킨 상점</h2>
      <div id="skins"></div>
    </div>

    <div id="skillLoadout">
      <h2>우클릭 스킬</h2>
      <div id="skills"></div>
    </div>

    <div id="highScore">
      최고 점수: <span id="best">0</span>
    </div>
    <button id="btnLeaderboard">리더보드</button>

    <div id="settings">
      <h2>설정</h2>
      <div id="settingsContent">
        <div class="settingRow">
          <span>테마</span>
          <div class="themeButtons">
            <button id="btnDark" class="themeBtn active">다크</button>
            <button id="btnLight" class="themeBtn">라이트</button>
          </div>
        </div>
        <div class="settingRow">
          <span>닉네임: <span id="currentNickname">미설정</span></span>
          <button id="btnChangeNick" class="themeBtn">변경</button>
        </div>
        <div class="settingRow">
          <span>키 배치</span>
          <div class="themeButtons">
            <button id="btnKeyWASD" class="themeBtn active">WASD 공격</button>
            <button id="btnKeyArrow" class="themeBtn">WASD 이동</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="pauseScreen" style="display:none">
    <div id="pauseBox">
      <h2>일시정지</h2>
      <div class="volumeRow">
        <span>BGM</span>
        <input type="range" id="sliderBgm" min="0" max="100" value="50" class="volSlider">
        <span id="valBgm">50</span>
      </div>
      <div class="volumeRow">
        <span>SFX</span>
        <input type="range" id="sliderSfx" min="0" max="100" value="50" class="volSlider">
        <span id="valSfx">50</span>
      </div>
      <button id="btnResume">일시정지 해제</button>
    </div>
  </div>

  <div id="warning" style="display:none">
    ⚠️ WARNING: 보스 곧 등장! ⚠️
  </div>

  <audio id="bgmTitle" src="Title.mp3" loop preload="auto"></audio>
  <audio id="bgmIngame" src="Ingame.mp3" loop preload="auto"></audio>

  <canvas id="gameCanvas" width="1200" height="720" style="display:none"></canvas>

  <div id="ui" style="display:none">
    <div id="hpBarContainer">
      <label>HP:</label>
      <div id="hpBar"><div></div></div>
    </div>
    <div id="scoreContainer">
      <label>점수:</label><span id="score">0</span>
    </div>
    <div id="bossUi" style="display:none">
      <label>Boss HP:</label>
      <div id="bossHpBar"><div></div></div>
    </div>
  </div>

  <div id="gameOverScreen" style="display:none">
    <h2>게임 오버!</h2>
    <div>최종 점수: <span id="finalScore">0</span></div>
    <button id="submitScore">점수 제출</button>
    <button id="btnRetry">다시하기</button>
    <div id="leaderboard" style="display:none">
      <h3>리더보드</h3>
      <ol id="boardList"></ol>
    </div>
  </div>

  <script type="module">
    document.getElementById('btnLeaderboard').addEventListener('click', () => {
      window.location.href = './ranking/';
    });

    // 닉네임 표시 및 변경
    function refreshNickDisplay() {
      const nick = localStorage.getItem('nickname');
      document.getElementById('currentNickname').textContent = nick || '미설정';
    }
    refreshNickDisplay();

    document.getElementById('btnChangeNick').addEventListener('click', () => {
      const newName = prompt('새 닉네임 입력 (한글 1~4자)');
      if (!newName) return;
      const trimmed = newName.trim();
      if (!/^[가-힣]{1,4}$/.test(trimmed)) {
        alert('이름은 한글 1~4자만 가능합니다.');
        return;
      }
      localStorage.setItem('nickname', trimmed);
      refreshNickDisplay();
    });
    const savedTheme = localStorage.getItem('theme') || 'dark';
    if (savedTheme === 'light') document.body.classList.add('light');
    document.getElementById('btnDark').classList.toggle('active', savedTheme === 'dark');
    document.getElementById('btnLight').classList.toggle('active', savedTheme === 'light');

    document.getElementById('btnDark').addEventListener('click', () => {
      document.body.classList.remove('light');
      localStorage.setItem('theme', 'dark');
      document.getElementById('btnDark').classList.add('active');
      document.getElementById('btnLight').classList.remove('active');
    });
    document.getElementById('btnLight').addEventListener('click', () => {
      document.body.classList.add('light');
      localStorage.setItem('theme', 'light');
      document.getElementById('btnLight').classList.add('active');
      document.getElementById('btnDark').classList.remove('active');
    });

    import './game.js';
  </script>
</body>
</html>
